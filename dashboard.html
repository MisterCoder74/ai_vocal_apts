<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard Appuntamenti — VivacityGPT</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.9.0/css/all.min.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
body, html {
height: 100%;
font-family: "Segoe UI", Roboto, sans-serif;
background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
color: #fff;
display: flex;
flex-direction: column;
align-items: center;
padding: 24px 18px;
}
h1 {
font-size: 1.8rem;
font-weight: 800;
margin-bottom: 6px;
background: linear-gradient(90deg, #10b981, #34d399);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}
p.subtitle {
color: rgba(255,255,255,0.35);
font-style: italic;
margin-bottom: 24px;
text-align: center;
max-width: 480px;
}
.cards {
display: flex;
gap: 20px;
flex-wrap: wrap;
justify-content: center;
margin-bottom: 36px;
}
.card {
background: rgba(16,185,129,0.15);
border-radius: 14px;
width: 220px;
height: 140px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
cursor: pointer;
color: #10b981;
font-weight: 700;
font-size: 1.1rem;
box-shadow: 0 0 12px rgba(16,185,129,0.3);
transition: background 0.25s, box-shadow 0.3s;
user-select: none;
}
.card i {
font-size: 2.8rem;
margin-bottom: 12px;
}
.card:hover {
background: rgba(16,185,129,0.35);
box-shadow: 0 0 28px rgba(16,185,129,0.7);
color: #d0f9e7;
}
.mini-table-container {
width: 100%;
max-width: 720px;
background: rgba(255,255,255,0.03);
border-radius: 12px;
padding: 18px 24px;
}
table {
width: 100%;
border-collapse: collapse;
color: rgba(255,255,255,0.9);
}
thead tr {
border-bottom: 2px solid #10b981;
}
th, td {
padding: 10px 14px;
font-size: 0.9rem;
text-align: left;
}
tbody tr:hover {
background: rgba(16,185,129,0.15);
}
tbody tr:nth-child(even) {
background: rgba(255, 255, 255, 0.05);
}
#refreshBtn {
background: transparent;
border: 1.5px solid #10b981;
color: #10b981;
padding: 6px 12px;
margin-top: 12px;
border-radius: 12px;
cursor: pointer;
font-weight: 600;
font-size: 0.9rem;
float: right;
transition: background 0.22s, color 0.22s;
}
#refreshBtn:hover {
background: #10b981;
color: #000;
}
#messageBox {
margin-top: 8px;
text-align: center;
font-weight: 700;
color: #00f2a0;
font-size: 0.95rem;
min-height: 22px;
user-select: none;
}
@media (max-width: 560px) {
.cards {
flex-direction: column;
gap: 14px;
align-items: center;
}
.card {
width: 90vw;
height: 130px;
}
.mini-table-container {
max-width: 100vw;
padding: 12px 14px;
}
}
</style>
</head>
<body>

<h1>Dashboard Appuntamenti</h1>
<p class="subtitle">Crea, gestisci e visualizza i tuoi appuntamenti in modo semplice e veloce.</p>

<div class="cards" role="navigation" aria-label="Sezioni principali">
<div class="card" tabindex="0" role="link" aria-label="Crea nuovo appuntamento" onclick="location.href='create_apts.html'" onkeypress="if(event.key==='Enter')this.click()">
<i class="fas fa-microphone"></i>
Nuovo Appuntamento
</div>
<div class="card" tabindex="0" role="link" aria-label="Gestisci appuntamenti esistenti" onclick="location.href='manage_apts.html'" onkeypress="if(event.key==='Enter')this.click()">
<i class="fas fa-list"></i>
Gestisci Appuntamenti
</div>
<div class="card" tabindex="0" role="link" aria-label="Visualizza calendario appuntamenti" onclick="location.href='calendar.html'" onkeypress="if(event.key==='Enter')this.click()">
<i class="fas fa-calendar-alt"></i>
Vista Calendario
</div>
</div>

<div class="mini-table-container" aria-label="Prossimi 5 appuntamenti">
<h2 style="font-weight:700; margin-bottom: 12px; color:#10b981; font-size:1.2rem;">Prossimi appuntamenti</h2>
<table aria-live="polite" aria-relevant="additions removals">
<thead>
<tr>
<th>Cliente</th><th>Data</th><th>Orario</th><th>Città</th><th>Indirizzo</th>
</tr>
</thead>
<tbody id="nextAppointmentsBody">
<tr><td colspan="5" style="text-align:center; opacity:0.5;">Caricamento...</td></tr>
</tbody>
</table>
<button id="refreshBtn" aria-label="Aggiorna lista appuntamenti">Aggiorna</button>
<div id="messageBox"></div>
</div>

<script>
const nextAppBody = document.getElementById('nextAppointmentsBody');
const messageBox = document.getElementById('messageBox');
const refreshBtn = document.getElementById('refreshBtn');

const maxNextAppointments = 5;

// Funzione per convertire la data da gg-mm-aaaa a ISO aaaa-mm-gg
function normalizeDate(dateStr) {
if (!dateStr) return null;
if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
// Già in formato ISO, ritorna così
return dateStr;
}
if (/^\d{2}-\d{2}-\d{4}$/.test(dateStr)) {
// Converti gg-mm-aaaa -> aaaa-mm-gg
const parts = dateStr.split('-');
return parts[2] + '-' + parts[1] + '-' + parts[0];
}
// formato non riconosciuto
return null;
}

async function loadNextAppointments() {
messageBox.textContent = '';
nextAppBody.innerHTML = '<tr><td colspan="5" style="text-align:center; opacity:0.5;">Caricamento...</td></tr>';
try {
const resp = await fetch('appointment_api.php?action=list');
if (!resp.ok) throw new Error(`Errore caricamento dati: ${resp.statusText}`);
const appointments = await resp.json();

const todayISO = new Date().toISOString().slice(0, 10);

// Filtra solo appuntamenti con data valida e data >= oggi
const filtered = appointments.filter(a => {
const d = normalizeDate(a.extracted_data?.data);
if (!d) return false;
return d >= todayISO;
});

// Ordina per data e orario
filtered.sort((a, b) => {
const da = normalizeDate(a.extracted_data?.data);
const db = normalizeDate(b.extracted_data?.data);
if (da === db) {
return (a.extracted_data?.orario ?? '') > (b.extracted_data?.orario ?? '') ? 1 : -1;
}
return da > db ? 1 : -1;
});

const sliced = filtered.slice(0, maxNextAppointments);

if (sliced.length === 0) {
nextAppBody.innerHTML = '<tr><td colspan="5" style="text-align:center; opacity:0.5;">Nessun appuntamento previsto.</td></tr>';
return;
}

nextAppBody.innerHTML = '';
sliced.forEach(a => {
const tr = document.createElement('tr');
const d = a.extracted_data || {};

tr.innerHTML = `
<td>${d.cliente ?? ''}</td>
<td>${d.data ?? ''}</td>
<td>${d.orario ?? ''}</td>
<td>${d.città ?? ''}</td>
<td>${d.indirizzo ?? ''}</td>
`;
nextAppBody.appendChild(tr);
});
} catch (e) {
nextAppBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#ff5d5d;">Errore caricamento dati</td></tr>';
messageBox.textContent = `Errore: ${e.message}`;
}
}

refreshBtn.addEventListener('click', loadNextAppointments);

// Carica ad avvio pagina
loadNextAppointments();
</script>

</body>
</html>
